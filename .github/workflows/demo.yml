name: demo

# Renders docs/demo.gif from docs/demo.tape on Linux (vhs is reliable there,
# unlike Windows) and commits the result. Triggered when the tape changes.

on:
  push:
    branches: [main]
    paths:
      - docs/demo.tape
      - .github/workflows/demo.yml
  workflow_dispatch:

permissions:
  contents: write   # commit the regenerated gif back to the branch

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install .          # `trove` on PATH, as a user would have it
      - name: Install vhs, ttyd, ffmpeg
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ttyd ffmpeg
      - run: vhs docs/demo.tape
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: regenerate demo gif [skip ci]"
          file_pattern: docs/demo.gif
