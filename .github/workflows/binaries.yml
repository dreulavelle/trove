name: binaries

# Compiles standalone `nps` and `trove` binaries with Nuitka for Linux, macOS,
# and Windows. Attaches them to a published release; can also be dispatched.
#
# Speed: each binary builds on its own runner (6 parallel jobs) instead of two
# per OS sequentially. Nuitka's own C-compiler cache (clcache) is left disabled
# on purpose — reusing it across runs triggers a "__helpers.h" crash, and it
# barely helps here since the time is in analysis/link/onefile packing, not C
# compilation. We still cache pip and Nuitka's downloaded toolchain.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: linux-x64,   entry: nps }
          - { os: ubuntu-latest,  target: linux-x64,   entry: trove }
          - { os: macos-latest,   target: macos-arm64, entry: nps }
          - { os: macos-latest,   target: macos-arm64, entry: trove }
          - { os: windows-latest, target: windows-x64, entry: nps }
          - { os: windows-latest, target: windows-x64, entry: trove }
    runs-on: ${{ matrix.os }}
    env:
      NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Cache Nuitka downloads/toolchain
        uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: nuitka-${{ matrix.target }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            nuitka-${{ matrix.target }}-
      - run: pip install . "nuitka[onefile]"
      - name: Compile ${{ matrix.entry }}
        shell: bash
        run: |
          ext=""
          [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          python -m nuitka --mode=onefile --assume-yes-for-downloads \
            --disable-cache=all \
            --include-package=trovenps \
            --include-package-data=trovenps \
            --include-package-data=textual \
            --include-distribution-metadata=trovenps \
            --output-dir=build-nuitka \
            --output-filename="${{ matrix.entry }}${ext}" \
            "packaging/${{ matrix.entry }}_entry.py"
          mkdir -p out
          mv "build-nuitka/${{ matrix.entry }}${ext}" "out/${{ matrix.entry }}-${{ matrix.target }}${ext}"
      - name: Smoke-test CLI binary
        if: matrix.entry == 'nps'
        shell: bash
        run: ./out/nps-${{ matrix.target }}* --version
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.entry }}-${{ matrix.target }}
          path: out/*
      - name: Attach to release
        if: github.event_name == 'release'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" out/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
